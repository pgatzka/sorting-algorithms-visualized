spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  batch:
    jdbc:
      initialize-schema: embedded
    job:
      enabled: false
  flyway:
    enabled: false

videogen:
  output-dir: ./test-videos
  ffmpeg-path: ffmpeg
  default-width: 1080
  default-height: 1920
  default-fps: 60
  default-element-count: 50
  default-frames-per-step: 3
